<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gözlerin Çok Güzel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="hero">
        <div class="heart-rain" aria-hidden="true">
            <span></span><span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span><span></span><span></span>
        </div>
        <div class="hero-content-simple eye-message-content">
            <h1>Gözlerin çok güzel</h1>
            <img class="eye-photo" src="gozler.webp" alt="Dilara'nin gozleri">
            <a class="btn" href="#">Teşekürleer</a>
        </div>
    </section>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const thanksButton = document.querySelector('.eye-message-content .btn');
            if (!thanksButton) return;
            thanksButton.addEventListener('click', (event) => {
                event.preventDefault();
                window.location.href = 'ending.html';
            });
        });
    </script>

    <iframe
        class="spotify-player"
        src="https://open.spotify.com/embed/track/7eRY9QFmTczZ3j1HCCq4Vr?utm_source=generator"
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
        loading="lazy">
    </iframe>
</body>
</html>
