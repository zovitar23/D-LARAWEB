<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Ending</title>
    <link rel="stylesheet" href="ending.css">
</head>
<body>
    <main class="ending-page">
        <canvas id="vortexCanvas" class="vortex-canvas" aria-hidden="true"></canvas>
        <div class="vignette" aria-hidden="true"></div>
        <div class="love-overlay" id="loveOverlay" aria-hidden="true"></div>
        <div class="arrival-gate" id="arrivalGate" aria-hidden="true"></div>

        <section class="ending-reveal" id="endingReveal" aria-hidden="true">
            <div class="ending-reveal__portal">
                <div class="ending-reveal__portal-image">
                    <img class="ending-reveal__image" src="dilara-ending.webp" alt="Dilara">
                </div>
            </div>

            <div class="ending-reveal__result">
                <img class="ending-reveal__result-image" src="dilara-ending.webp" alt="Dilara">
                <p class="ending-reveal__caption">Gözleri, acımasızlığın olmadığı bir dünyanın yansımasıydı.</p>
            </div>
        </section>

        <section class="ending-quote" id="endingQuote" aria-hidden="true">
            <div class="ending-quote__screen"></div>
            <div class="ending-quote__screen ending-quote__screen--light"></div>
            <div class="ending-quote__text">
                <p class="ending-quote__line ending-quote__line--dark">Dilara ne anlama geliyor bilmiyorum.</p>
                <p class="ending-quote__line ending-quote__line--light">Benim için ne anlama geliyor biliyor musun?</p>
            </div>
        </section>

        <section class="ending-space" id="endingSpace" aria-hidden="true">
            <canvas id="spaceCanvas" class="ending-space__canvas"></canvas>
            <div class="ending-space__glow"></div>
            <div class="ending-space__camera" id="endingSpaceCamera">
                <div class="ending-space__phrase" id="endingSpacePhrase"></div>
            </div>
        </section>

        <section class="ending-copy">
            <p class="ending-kicker">Her dilde, tekrar ve tekrar. Seni seviyorum.</p>
            <p class="ending-note">Her dilde aynı his.</p>
        </section>
    </main>

    <script src="ending.js"></script>
</body>
</html>
