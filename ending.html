<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Ending</title>
    <link rel="stylesheet" href="ending.css">
</head>
<body>
    <main class="ending-page">
        <canvas id="vortexCanvas" class="vortex-canvas" aria-hidden="true"></canvas>
        <div class="vignette" aria-hidden="true"></div>
        <div class="love-overlay" id="loveOverlay" aria-hidden="true"></div>
        <div class="arrival-gate" id="arrivalGate" aria-hidden="true"></div>
        <section class="ending-reveal" id="endingReveal" aria-hidden="true">
            <div class="ending-reveal__content">
                <div class="ending-reveal__frame">
                <img class="ending-reveal__image" src="dilara-ending.webp" alt="Dilara">
                </div>
                <p class="ending-reveal__caption">Gözleri acımasızlığın olmadığı bir dünyanın yansımasıydı</p>
            </div>
        </section>

        <section class="ending-copy">
            <p class="ending-kicker">Her dilde, tekrar ve tekrar. Seni seviyorum.</p>
            <p class="ending-note">Her dilde ayn&#305; his.</p>
        </section>
    </main>

    <script src="ending.js"></script>
</body>
</html>
